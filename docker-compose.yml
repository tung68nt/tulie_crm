services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3010:3001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3010
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001" ]
      interval: 10s
      timeout: 5s
      retries: 5
